<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUDI | Your Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="source/MUDI-cloud-clean.png">
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="ambient ambient-one" aria-hidden="true"></div>

    <header class="site-header">
        <a class="brand" href="main.html">
            <img src="source/MUDI-cloud-clean.png" alt="">
            <span>MUDI</span>
        </a>
        <div class="header-actions">
            <button class="retry-btn" onclick="location.href='selec.html'">Reroll</button>
            <button class="mypage-btn" onclick="location.href='mypage.html'">My Page</button>
        </div>
    </header>

    <main class="result-container">
        <div class="label-block">
            <span class="playlist-type">Generated Playlist</span>
            <h1 class="playlist-title">Loading...</h1>

            <p class="playlist-stats">
                <span class="user-name">User Name</span> • <span id="playlist-stats-data">0 songs, 0 min</span>
            </p>
        </div>

        <div class="emotions-strip">
            <span class="selected-label">YOUR MOODS</span>
            <div id="selected-emotions-container" class="selected-list"></div>
        </div>

        <div class="tracklist-box">
            <div class="track-header">
                <div class="col-index">#</div>
                <div class="col-title">Title</div>
                <div class="col-artist">Artist</div>
                <div class="col-time">
                    <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
                        <path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm-30-320h184v-60H450v180h60v-120Zm30-40Z"/>
                    </svg>
                </div>
                <div class="col-action"></div>
            </div>

            <div id="track-container"></div>
        </div>
    </main>

    <div class="floating-action-bar">
        <button class="play-btn">Play</button>
        <button class="export-btn">Export</button>
    </div>

    <script src="result.js"></script>
</body>
</html>
