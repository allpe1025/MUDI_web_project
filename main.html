<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mood Music</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1 class="logo">Mood Music</h1>
        <nav class="button-group" aria-label="User menu">
            <button type="button" id="login">Login</button>
            <button type="button" id="signup">Sign Up</button>
            <button type="button" id="mypage">My Page</button>
        </nav>
    </header>

    <main class="content">
        <section class="intro">
            <p>
                Choose how you feel and discover music that matches your mood.
                Create your own playlist, listen instantly, and save your favorites anytime.
            </p>
            <button type="button" class="start-button">Start</button>
        </section>
        <div class="logo-image">
            <img src="https://placehold.co/400x400/151618/75dd78?text=Mood+Music" alt="Mood Music preview">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mood Music. All rights reserved.</p>
        <p>Music data provided by last.fm, YouTube, and Spotify.</p>
    </footer>
</body>
</html>
